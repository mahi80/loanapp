services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://loan:loan@postgres:5432/loan_underwriting
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - loan-network

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: loan
      POSTGRES_PASSWORD: loan
      POSTGRES_DB: loan_underwriting
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loan"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - loan-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - loan-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - INTERNAL_API_URL=http://app:8000
      - AUTH_TRUST_HOST=true
    depends_on:
      - app
    networks:
      - loan-network

volumes:
  postgres_data:
  redis_data:

networks:
  loan-network:
    driver: bridge
