global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "credit-scoring-app"
    static_configs:
      - targets: ["app:8000"]

  - job_name: "litellm"
    static_configs:
      - targets: ["litellm:4000"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]
